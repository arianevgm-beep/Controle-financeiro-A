<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Financeiro</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#22c55e;
color:white;
border:none;
font-weight:bold;
}

.renda{color:green;}
.despesa{color:red;}

</style>

</head>
<body>

<h2>💰 Controle Financeiro</h2>

<div class="card">

<input type="text" id="descricao" placeholder="Descrição">

<input type="number" id="valor" placeholder="Valor">

<select id="tipo">
<option value="renda">Renda</option>
<option value="despesa">Despesa</option>
</select>

<select id="parcelado">
<option value="nao">À vista</option>
<option value="sim">Parcelado</option>
</select>

<input type="number" id="parcelas" placeholder="Quantidade parcelas" style="display:none">

<button onclick="adicionar()">Adicionar</button>

</div>

<div class="card">
<h3>Lista</h3>
<div id="lista"></div>
</div>

<script>

let dados=JSON.parse(localStorage.getItem("fin"))||{};

document.getElementById("parcelado").addEventListener("change",function(){
document.getElementById("parcelas").style.display=
this.value==="sim"?"block":"none";
});

function adicionar(){

let desc=document.getElementById("descricao").value;
let valor=parseFloat(document.getElementById("valor").value);
let tipo=document.getElementById("tipo").value;

let parcelado=document.getElementById("parcelado").value;
let parcelas=parseInt(document.getElementById("parcelas").value)||1;

let mes=new Date().toLocaleString('pt-BR',{month:'long',year:'numeric'});

if(!dados[mes]) dados[mes]=[];

if(parcelado==="sim" && parcelas>1){

for(let i=0;i<parcelas;i++){

let data=new Date();
data.setMonth(data.getMonth()+i);

let mesNome=data.toLocaleString('pt-BR',{month:'long',year:'numeric'});

if(!dados[mesNome]) dados[mesNome]=[];

dados[mesNome].push({
descricao:desc+` (${i+1}/${parcelas})`,
valor:valor,
tipo:tipo
});

}

}else{

dados[mes].push({
descricao:desc,
valor:valor,
tipo:tipo
});

}

localStorage.setItem("fin",JSON.stringify(dados));
atualizar();

}

function atualizar(){

let mes=new Date().toLocaleString('pt-BR',{month:'long',year:'numeric'});
let lista=document.getElementById("lista");

lista.innerHTML="";

let total=0;

if(dados[mes]){

dados[mes].forEach(item=>{

let div=document.createElement("div");

div.innerHTML=`
<span class="${item.tipo}">
${item.descricao} - R$ ${item.valor.toFixed(2)}
</span>
`;

lista.appendChild(div);

if(item.tipo==="renda") total+=item.valor;
else total-=item.valor;

});

}

}

atualizar();

</script>

</body>
</html>
