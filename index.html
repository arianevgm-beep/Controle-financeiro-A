<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financeiro</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#22c55e;
color:white;
border:none;
font-weight:bold;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:6px 0;
}

.item button{
width:auto;
margin-left:5px;
padding:5px 8px;
font-size:12px;
background:#ddd;
color:black;
}

.renda{color:green;}
.despesa{color:red;}

</style>

</head>

<body>

<h2>💰 Controle Financeiro</h2>

<div class="card">

<input type="text" id="descricao" placeholder="Descrição">
<input type="number" id="valor" placeholder="Valor">

<select id="tipo">
<option value="renda">Renda</option>
<option value="despesa">Despesa</option>
</select>

<select id="parcelado">
<option value="nao">À vista</option>
<option value="sim">Parcelado</option>
</select>

<input type="number" id="parcelas" placeholder="Qtd parcelas" style="display:none">

<button onclick="adicionar()">Adicionar</button>

</div>

<div class="card">
<h3>Lista</h3>
<div id="lista"></div>
</div>

<script>

let dados=JSON.parse(localStorage.getItem("financeiroApp"))||{};

document.getElementById("parcelado").addEventListener("change",function(){
document.getElementById("parcelas").style.display=
this.value==="sim"?"block":"none";
});

function salvar(){
localStorage.setItem("financeiroApp",JSON.stringify(dados));
}

function adicionar(){

let desc=document.getElementById("descricao").value;
let valor=parseFloat(document.getElementById("valor").value);
let tipo=document.getElementById("tipo").value;

let parcelado=document.getElementById("parcelado").value;
let qtd=parseInt(document.getElementById("parcelas").value)||1;

let mesAtual=new Date().toLocaleString('pt-BR',{month:'long',year:'numeric'});

if(!dados[mesAtual]) dados[mesAtual]=[];

if(parcelado==="sim" && qtd>1){

for(let i=0;i<qtd;i++){

let data=new Date();
data.setMonth(data.getMonth()+i);

let mes=data.toLocaleString('pt-BR',{month:'long',year:'numeric'});

if(!dados[mes]) dados[mes]=[];

dados[mes].push({
id:Date.now()+Math.random(),
descricao:desc+` (${i+1}/${qtd})`,
valor:valor,
tipo:tipo
});

}

}else{

dados[mesAtual].push({
id:Date.now()+Math.random(),
descricao:desc,
valor:valor,
tipo:tipo
});

}

salvar();
atualizar();

}

function excluir(mes,id){

dados[mes]=dados[mes].filter(i=>i.id!==id);

salvar();
atualizar();

}

function editar(mes,id){

let item=dados[mes].find(i=>i.id===id);

let novoDesc=prompt("Editar descrição",item.descricao);
let novoValor=parseFloat(prompt("Editar valor",item.valor));

if(novoDesc && !isNaN(novoValor)){

item.descricao=novoDesc;
item.valor=novoValor;

salvar();
atualizar();

}

}

function atualizar(){

let mes=new Date().toLocaleString('pt-BR',{month:'long',year:'numeric'});

let lista=document.getElementById("lista");
lista.innerHTML="";

let total=0;

if(dados[mes]){

dados[mes].forEach(item=>{

if(item.tipo==="renda") total+=item.valor;
else total-=item.valor;

let div=document.createElement("div");
div.className="item "+item.tipo;

div.innerHTML=`
<span>${item.descricao} - R$ ${item.valor.toFixed(2)}</span>

<div>
<button onclick="editar('${mes}',${item.id})">Editar</button>
<button onclick="excluir('${mes}',${item.id})">Excluir</button>
</div>
`;

lista.appendChild(div);

});

}

}

atualizar();

</script>

</body>
</html>
