<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financeiro Ariane</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#22c55e">

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:15px;
box-shadow:0 3px 10px rgba(0,0,0,.05);
}

input,select,button{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
border:none;
}

.item{
display:flex;
justify-content:space-between;
margin:6px 0;
align-items:center;
}

.item button{
width:auto;
font-size:12px;
padding:5px 8px;
background:#ddd;
color:black;
margin-left:5px;
}

.renda{color:green;}
.despesa{color:red;}

.saldo{
font-size:22px;
text-align:center;
font-weight:bold;
}

.positivo{color:#22c55e;}
.negativo{color:#ef4444;}

</style>

</head>

<body>

<h2>💰 Controle Financeiro</h2>

<div class="card">

<label>Mês</label>
<select id="mesSelecionado"></select>

<input type="text" id="descricao" placeholder="Descrição">
<input type="number" id="valor" placeholder="Valor">

<select id="tipo">
<option value="renda">Renda</option>
<option value="despesa">Despesa</option>
</select>

<select id="parcelado">
<option value="nao">À vista</option>
<option value="sim">Parcelado</option>
</select>

<input type="number" id="parcelas" placeholder="Qtd parcelas" style="display:none">

<button onclick="adicionar()">Adicionar</button>

</div>

<div class="card">
<div id="saldo" class="saldo"></div>
</div>

<div class="card">
<h3>Lista</h3>
<div id="lista"></div>
</div>

<script>

/* BANCO LOCAL */
let dados=JSON.parse(localStorage.getItem("financeiroFinal"))||{};

/* GERAR MESES INFINITOS */
function gerarMeses(){

let select=document.getElementById("mesSelecionado");
select.innerHTML="";

let hoje=new Date();

for(let i=-60;i<120;i++){

let data=new Date(hoje.getFullYear(),hoje.getMonth()+i);

let mes=data.toLocaleString('pt-BR',{
month:'long',
year:'numeric'
});

let option=document.createElement("option");
option.value=mes;
option.textContent=mes;

select.appendChild(option);

}

select.selectedIndex=60;
}

gerarMeses();

/* PARCELADO */
document.getElementById("parcelado").addEventListener("change",function(){

document.getElementById("parcelas").style.display=
this.value==="sim"?"block":"none";

});

/* SALVAR */
function salvar(){
localStorage.setItem("financeiroFinal",JSON.stringify(dados));
}

/* ADICIONAR */
function adicionar(){

let desc=document.getElementById("descricao").value;
let valor=parseFloat(document.getElementById("valor").value);
let tipo=document.getElementById("tipo").value;

let parcelado=document.getElementById("parcelado").value;
let qtd=parseInt(document.getElementById("parcelas").value)||1;

let mesSelecionado=document.getElementById("mesSelecionado").value;

if(!dados[mesSelecionado]) dados[mesSelecionado]=[];

/* PARCELAMENTO */
if(parcelado==="sim" && qtd>1){

for(let i=0;i<qtd;i++){

let data=new Date();
data.setMonth(data.getMonth()+i);

let mes=data.toLocaleString('pt-BR',{
month:'long',
year:'numeric'
});

if(!dados[mes]) dados[mes]=[];

dados[mes].push({
id:Date.now()+Math.random(),
descricao:desc+` (${i+1}/${qtd})`,
valor:valor,
tipo:tipo
});

}

}else{

dados[mesSelecionado].push({
id:Date.now()+Math.random(),
descricao:desc,
valor:valor,
tipo:tipo
});

}

salvar();
atualizar();

}

/* EXCLUIR */
function excluir(mes,id){

dados[mes]=dados[mes].filter(i=>i.id!==id);
salvar();
atualizar();

}

/* EDITAR */
function editar(mes,id){

let item=dados[mes].find(i=>i.id===id);

let novoDesc=prompt("Editar descrição",item.descricao);
let novoValor=parseFloat(prompt("Editar valor",item.valor));

if(novoDesc && !isNaN(novoValor)){

item.descricao=novoDesc;
item.valor=novoValor;

salvar();
atualizar();

}

}

/* ATUALIZAR TELA */
function atualizar(){

let mes=document.getElementById("mesSelecionado").value;

let lista=document.getElementById("lista");
lista.innerHTML="";

let total=0;

if(dados[mes]){

dados[mes].forEach(item=>{

if(item.tipo==="renda") total+=item.valor;
else total-=item.valor;

let div=document.createElement("div");
div.className="item "+item.tipo;

div.innerHTML=`
<span>${item.descricao} - R$ ${item.valor.toFixed(2)}</span>

<div>
<button onclick="editar('${mes}',${item.id})">Editar</button>
<button onclick="excluir('${mes}',${item.id})">Excluir</button>
</div>
`;

lista.appendChild(div);

});

}

let saldo=document.getElementById("saldo");

saldo.innerHTML="💰 Saldo: R$ "+total.toFixed(2);
saldo.className="saldo "+(total>=0?"positivo":"negativo");

}

document.getElementById("mesSelecionado").addEventListener("change",atualizar);

atualizar();

</script>

</body>
</html>
