<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financeiro Ariane</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
padding:20px;
margin:0;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:#1e293b;
padding:18px;
border-radius:16px;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:none;
}

button{
background:#22c55e;
color:white;
font-weight:bold;
}

h2{text-align:center;}

.renda{color:#22c55e;}
.despesa{color:#ef4444;}

.saldo{
font-size:24px;
text-align:center;
font-weight:bold;
}

.positivo{color:#22c55e;}
.negativo{color:#ef4444;}

.item{
display:flex;
justify-content:space-between;
margin:6px 0;
}

</style>

</head>

<body>

<div class="container">

<h2>💰 Financeiro Ariane</h2>

<div class="card">
<select id="mes"></select>
</div>

<div class="card">

<input type="text" id="descricao" placeholder="Descrição">
<input type="number" id="valor" placeholder="Valor">

<select id="tipo">
<option value="renda">Renda</option>
<option value="despesa">Despesa</option>
</select>

<select id="parcelado">
<option value="nao">À vista</option>
<option value="sim">Parcelado</option>
</select>

<input type="number" id="parcelas" placeholder="Qtd parcelas" style="display:none">

<button onclick="adicionar()">Adicionar</button>

</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card">
<div id="saldo" class="saldo"></div>
</div>

<div class="card">
<h3>Lista do mês</h3>
<div id="lista"></div>
</div>

</div>

<script>

let dados=JSON.parse(localStorage.getItem("financeiroFinal"))||{};

const mesSelect=document.getElementById("mes");
const hoje=new Date();

for(let i=-24;i<60;i++){
let data=new Date(hoje.getFullYear(),hoje.getMonth()+i);
let nome=data.toLocaleString('pt-BR',{month:'long',year:'numeric'});
let option=document.createElement("option");
option.value=nome;
option.textContent=nome;
mesSelect.appendChild(option);
}

mesSelect.selectedIndex=24;

document.getElementById("parcelado").addEventListener("change",function(){
document.getElementById("parcelas").style.display=
this.value==="sim"?"block":"none";
});

function salvar(){
localStorage.setItem("financeiroFinal",JSON.stringify(dados));
}

function adicionar(){

let desc=document.getElementById("descricao").value;
let valor=parseFloat(document.getElementById("valor").value);
let tipo=document.getElementById("tipo").value;
let parcelado=document.getElementById("parcelado").value;
let qtd=parseInt(document.getElementById("parcelas").value)||1;

if(!desc||!valor)return;

if(parcelado==="sim" && qtd>1){

for(let i=0;i<qtd;i++){

let data=new Date();
data.setMonth(data.getMonth()+i);

let mes=data.toLocaleString('pt-BR',{month:'long',year:'numeric'});

if(!dados[mes]) dados[mes]=[];

dados[mes].push({
id:Date.now()+i,
descricao:desc+` (${i+1}/${qtd})`,
valor:valor,
tipo:tipo
});

}

}else{

let mesAtual=mesSelect.value;

if(!dados[mesAtual]) dados[mesAtual]=[];

dados[mesAtual].push({
id:Date.now(),
descricao:desc,
valor:valor,
tipo:tipo
});

}

salvar();
atualizar();
}

function excluir(mes,id){
dados[mes]=dados[mes].filter(i=>i.id!==id);
salvar();
atualizar();
}

function atualizar(){

let mes=mesSelect.value;
let lista=dados[mes]||[];

let listaDiv=document.getElementById("lista");
listaDiv.innerHTML="";

let totalR=0;
let totalD=0;

lista.forEach(item=>{

if(item.tipo==="renda") totalR+=item.valor;
else totalD+=item.valor;

let div=document.createElement("div");
div.className="item "+item.tipo;

div.innerHTML=`
<span>${item.descricao} - R$ ${item.valor.toFixed(2)}</span>
<button onclick="excluir('${mes}',${item.id})">X</button>
`;

listaDiv.appendChild(div);

});

let saldo=totalR-totalD;

document.getElementById("saldo").innerHTML=`
🟢 Rendas: R$ ${totalR.toFixed(2)}<br>
🔴 Despesas: R$ ${totalD.toFixed(2)}<br><br>
💰 Saldo: R$ ${saldo.toFixed(2)}
`;

document.getElementById("saldo").className=
"saldo "+(saldo>=0?"positivo":"negativo");

gerarGrafico(totalR,totalD);

}

let chart;

function gerarGrafico(r,d){

let ctx=document.getElementById("grafico").getContext("2d");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Rendas","Despesas"],
datasets:[{
data:[r,d]
}]
}
});

}

mesSelect.addEventListener("change",atualizar);

atualizar();

</script>

</body>
</html>
