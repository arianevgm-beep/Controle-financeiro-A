<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Financeiro Master</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0ea5e9">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

.card{
background:#1e293b;
padding:18px;
border-radius:16px;
margin-bottom:15px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:none;
}

button{
background:#0ea5e9;
color:white;
font-weight:bold;
}

h2{text-align:center;}

.renda{color:#22c55e;}
.despesa{color:#ef4444;}

.saldo{
font-size:24px;
text-align:center;
font-weight:bold;
}

.positivo{color:#22c55e;}
.negativo{color:#ef4444;}

.item{
display:flex;
justify-content:space-between;
margin:6px 0;
}

</style>

</head>

<body>

<div class="container">

<h2>💎 Financeiro Master</h2>

<div id="loginBox" class="card">
<h3>🔐 Login</h3>
<input type="password" id="senha" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>

<div id="appBox" style="display:none">

<div class="card">
<h3>Adicionar</h3>

<input type="text" id="descricao" placeholder="Descrição">
<input type="number" id="valor" placeholder="Valor">

<select id="tipo">
<option value="renda">Renda</option>
<option value="despesa">Despesa</option>
</select>

<button onclick="adicionar()">Adicionar</button>
</div>

<div class="card">
<canvas id="grafico"></canvas>
</div>

<div class="card">
<div id="saldo" class="saldo"></div>
</div>

<div class="card">
<h3>Lista do mês</h3>
<div id="lista"></div>
</div>

</div>

</div>

<script>

let senhaPadrao="1234";

let dados=JSON.parse(localStorage.getItem("masterFinanceiro"))||{};

let chart;

function entrar(){
if(document.getElementById("senha").value===senhaPadrao){
document.getElementById("loginBox").style.display="none";
document.getElementById("appBox").style.display="block";
atualizar();
}else alert("Senha errada");
}

function salvar(){
localStorage.setItem("masterFinanceiro",JSON.stringify(dados));
}

function adicionar(){

let desc=document.getElementById("descricao").value;
let valor=parseFloat(document.getElementById("valor").value);
let tipo=document.getElementById("tipo").value;

if(!desc||!valor)return;

let mes=new Date().toLocaleString('pt-BR',{month:'long',year:'numeric'});

if(!dados[mes]) dados[mes]=[];

dados[mes].push({
id:Date.now(),
descricao:desc,
valor:valor,
tipo:tipo
});

salvar();
atualizar();
}

function excluir(id){
let mes=obterMes();
dados[mes]=dados[mes].filter(i=>i.id!==id);
salvar();
atualizar();
}

function obterMes(){
return new Date().toLocaleString('pt-BR',{month:'long',year:'numeric'});
}

function atualizar(){

let mes=obterMes();
let lista=dados[mes]||[];

let listaDiv=document.getElementById("lista");
listaDiv.innerHTML="";

let totalR=0;
let totalD=0;

lista.forEach(item=>{

if(item.tipo==="renda") totalR+=item.valor;
else totalD+=item.valor;

let div=document.createElement("div");
div.className="item "+item.tipo;

div.innerHTML=`
<span>${item.descricao} - R$ ${item.valor.toFixed(2)}</span>
<button onclick="excluir(${item.id})">X</button>
`;

listaDiv.appendChild(div);

});

let saldo=totalR-totalD;

document.getElementById("saldo").innerHTML=`
🟢 Rendas: R$ ${totalR.toFixed(2)}<br>
🔴 Despesas: R$ ${totalD.toFixed(2)}<br><br>
💰 Saldo: R$ ${saldo.toFixed(2)}
`;

document.getElementById("saldo").className=
"saldo "+(saldo>=0?"positivo":"negativo");

gerarGrafico(totalR,totalD);

}

function gerarGrafico(r,d){

let ctx=document.getElementById("grafico");

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"doughnut",
data:{
labels:["Rendas","Despesas"],
datasets:[{data:[r,d]}]
}
});

}

</script>

</body>
</html>
